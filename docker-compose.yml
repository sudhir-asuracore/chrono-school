services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chronoschool
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  core-engine:
    build: ./core-engine
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000

  backend-api:
    build: ./backend-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_URL=postgres://user:password@postgres:5432/chronoschool?sslmode=disable
      - REDIS_URL=redis:6379
    depends_on:
      - postgres
      - redis

  job-queue:
    build: ./job-queue
    restart: always
    environment:
      - DB_URL=postgres://user:password@postgres:5432/chronoschool?sslmode=disable
      - REDIS_URL=redis:6379
      - SOLVER_URL=http://core-engine:8000
    depends_on:
      - postgres
      - redis
      - core-engine

  frontend-ui:
    build: 
      context: ./frontend-ui
      args:
        - VITE_API_BASE_URL=http://localhost:8080/api/v1
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend-api

volumes:
  postgres_data:
