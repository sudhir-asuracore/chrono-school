name: Build and Package

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target Platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux
          - windows
          - macos

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            artifact_name: chrono-school-linux
          - platform: windows
            os: windows-latest
            artifact_name: chrono-school-windows
          - platform: macos
            os: macos-latest
            artifact_name: chrono-school-macos
    runs-on: ${{ matrix.os }}
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == matrix.platform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: solver-src/requirements.txt

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
        shell: bash

      - name: Build Solver
        shell: bash
        run: |
          cd solver-src
          pip install -r requirements.txt pyinstaller pyinstaller-hooks-contrib
          pyinstaller solver.spec
          mkdir -p ../bin
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            if [ -f "dist/solver.exe" ]; then
              cp dist/solver.exe ../bin/
            else
              # Sometimes pyinstaller might not add .exe if spec doesn't have it, 
              # but usually it does on Windows.
              cp dist/solver ../bin/solver.exe
            fi
          else
            cp dist/solver ../bin/
          fi

      - name: Build Wails App
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" == "macos" ]; then
            wails build -platform darwin/universal
          else
            wails build
          fi

      - name: Package Artifacts
        shell: bash
        run: |
          mkdir -p dist_package
          if [ "${{ matrix.platform }}" == "linux" ]; then
            mkdir -p dist_package/bin
            cp build/bin/desktop-app dist_package/
            cp bin/solver dist_package/bin/
            cd dist_package && zip -r ../chrono-school-linux.zip .
          elif [ "${{ matrix.platform }}" == "windows" ]; then
            mkdir -p dist_package/bin
            cp build/bin/desktop-app.exe dist_package/
            cp bin/solver.exe dist_package/bin/
            cd dist_package && zip -r ../chrono-school-windows.zip .
          elif [ "${{ matrix.platform }}" == "macos" ]; then
            # Bundle solver into .app
            mkdir -p build/bin/desktop-app.app/Contents/MacOS/bin
            cp bin/solver build/bin/desktop-app.app/Contents/MacOS/bin/
            cd build/bin && zip -r ../../chrono-school-macos.zip desktop-app.app
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: chrono-school-*.zip
